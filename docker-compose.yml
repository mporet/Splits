version: '3.8'

services:
  splits-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: splits-app:latest
    container_name: splits-app
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env
    volumes:
      # Mount the host directory to /app/data inside the container
      - splits-data:/app/data

volumes:
  splits-data:
